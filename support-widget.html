<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scanner numere IF</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
margin-top:80px;
}

input{
padding:10px;
font-size:20px;
text-transform:uppercase;
}

button{
padding:10px 20px;
font-size:20px;
}

#rez{
margin-top:30px;
}

.item{
margin:5px;
}
</style>

</head>

<body>

<h1>Căutare numere IF</h1>

<input id="litere" maxlength="3" placeholder="ABC">

<button onclick="gen()">Generează</button>

<div id="rez"></div>

<script>

function gen(){

let lit=document.getElementById("litere").value.toUpperCase()

let rez=document.getElementById("rez")

rez.innerHTML=""

for(let i=1;i<=999;i++){

let nr="IF "+String(i).padStart(2,"0")+" "+lit

let link="https://dgpci.mai.gov.ro/drpciv-number-check"

let div=document.createElement("div")
div.className="item"

div.innerHTML=nr+" <a href='"+link+"' target='_blank'>Verifică oficial</a>"

rez.appendChild(div)

}

}

</script>

</body>
</html>
